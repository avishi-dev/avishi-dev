<svg width="900" height="360" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#0d1117"/>

  <!-- Border -->
  <rect
    x="20"
    y="20"
    width="860"
    height="320"
    fill="none"
    stroke="#39FF14"
    stroke-width="3"/>

  <!-- Header -->
  <line x1="20" y1="70" x2="880" y2="70" stroke="#39FF14" stroke-width="2"/>

  <text
    x="450"
    y="55"
    fill="#39FF14"
    font-family="Courier New"
    font-size="28"
    text-anchor="middle"
    filter="url(#glow)">
PROGRESS LOADING...
  </text>

  <!-- Content -->

  <g
    fill="#d0ffd0"
    font-family="Courier New"
    font-size="22">

    <text x="55" y="120">Name        : Avishi Agarwal</text>

    <text x="55" y="155">Target Role : AI Engineer | ML Engineer | SDE</text>

    <text x="55" y="190">Languages   : Python | C++ | C</text>

    <text x="55" y="225">AI Stack    : PyTorch | TensorFlow | OpenCV</text>

    <text x="55" y="260">LLM Stack   : Hugging Face | LangChain | ChromaDB</text>

    <text x="55" y="295">Focus       : Agentic AI | RAG | Computer Vision</text>

  </g>

  <!-- Cursor -->
  <text
      x="55"
      y="330"
      fill="#39FF14"
      font-family="Courier New"
      font-size="22"
      filter="url(#glow)">
&gt; _
  </text>
</svg>
